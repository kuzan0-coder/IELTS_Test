<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset Password — IELTS Prep</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" href="assets/logo.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/theme.js"></script>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-hero">
      <div class="hero-brand"><img class="brand-logo" src="assets/logo.png" alt="IELTS Prep"> IELTS Prep</div>
      <h1>Buat password baru.</h1>
      <p>Tinggal selangkah lagi — masukkan password baru untuk akunmu, lalu kamu bisa masuk lagi.</p>
    </div>

    <div class="auth-panel">
      <div class="auth-card">
        <h2 id="rp-title">Atur Password Baru 🔑</h2>
        <p class="auth-sub" id="rp-sub">Masukkan password baru kamu di bawah ini.</p>

        <form id="rp-form" autocomplete="on">
          <div class="field">
            <label for="rp-pass">Password Baru</label>
            <div class="password-wrap">
              <input type="password" id="rp-pass" placeholder="Minimal 6 karakter" minlength="6" autocomplete="new-password">
              <button type="button" class="pw-toggle" data-target="rp-pass" aria-label="Tampilkan password">👁️</button>
            </div>
          </div>
          <div class="field">
            <label for="rp-pass2">Konfirmasi Password Baru</label>
            <div class="password-wrap">
              <input type="password" id="rp-pass2" placeholder="Ketik ulang password" autocomplete="new-password">
              <button type="button" class="pw-toggle" data-target="rp-pass2" aria-label="Tampilkan password">👁️</button>
            </div>
          </div>
          <button class="btn block" id="rp-submit" type="submit">Simpan Password Baru</button>
        </form>

        <div class="auth-msg" id="rp-msg"></div>
        <a href="login.html" class="link-btn" style="display:inline-block;margin-top:14px">← Kembali ke halaman masuk</a>
      </div>
    </div>
  </div>

  <script src="js/pw-toggle.js"></script>
  <script src="js/reset-password.js"></script>
</body>
</html>
