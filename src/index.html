<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IELTS Prep — Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/store.js"></script>
  <script src="js/license.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/app-shell.js"></script>
</head>
<body>
  <div class="layout">
    <aside></aside>
    <main>
      <div class="page-header">
        <h2 id="greeting">Halo!</h2>
        <div class="meta" id="today-date"></div>
      </div>

      <div class="card">
        <h3>Skor terkini per skill</h3>
        <div class="grid-2" id="skill-stats"></div>
        <div class="target-note">
          <strong>Target rata-rata: 6.5</strong> · <span id="overall-avg">—</span>
        </div>
      </div>

      <div class="card">
        <h3>Mulai latihan</h3>
        <p class="muted">Pilih skill yang mau dilatih hari ini.</p>
        <div class="btn-row">
          <a href="reading.html" class="btn">Reading</a>
          <a href="listening.html" class="btn">Listening</a>
          <a href="writing.html" class="btn">Writing</a>
          <a href="speaking.html" class="btn">Speaking</a>
          <a href="vocabulary.html" class="btn">Vocabulary</a>
          <a href="tutorials.html" class="btn secondary">Tutorial</a>
          <a href="plan.html" class="btn secondary">Study Plan</a>
          <a href="tips.html" class="btn secondary">Tips</a>
        </div>
      </div>

      <div class="card">
        <div class="card-head-row">
          <h3>Riwayat Sesi Terakhir</h3>
          <a href="history.html" class="btn secondary" style="padding:7px 14px">Lihat semua →</a>
        </div>
        <div id="history-list" style="margin-top:14px">
          <p class="muted">Belum ada sesi. Mulai latihan pertamamu!</p>
        </div>
      </div>
    </main>
  </div>
  <script src="js/ui.js"></script>
  <script src="js/home.js"></script>
</body>
</html>
